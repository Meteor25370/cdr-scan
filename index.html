}

function showRawSessionDetail(sessionId) {
  const session = appState.sessions.find(s => s.sessionId === sessionId);
  if (!session) return;
  const MAX_RAW_EVENTS = 30;
  const events = [...session.events].sort((a,b) => (a.date||0) - (b.date||0));
  const shown = events.slice(0, MAX_RAW_EVENTS);
  const body = shown.map((evt, index) => `
    <div style="margin-bottom:22px">
      <h4 style="margin:0 0 8px;font-size:.9rem">Ligne ${index + 1} · ${evt.icon} ${escapeHtml(evt.eventName)} <code style="color:var(--accent)">${escapeHtml(evt.eventId)}</code></h4>
      ${buildRawEventHTML(evt, { hideTitle: true })}
    </div>
  `).join('');
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div>
            <h3>Données brutes session</h3>
            <code style="font-size:.74rem;color:var(--accent);word-break:break-all">${escapeHtml(sessionId)}</code>
          </div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          ${events.length > MAX_RAW_EVENTS ? `<div style="font-size:.78rem;color:var(--warn);margin-bottom:12px">Session volumineuse: ${MAX_RAW_EVENTS} / ${events.length} événements bruts affichés.</div>` : ''}
          ${body}
        </div>
      </div>
    </div>
  `;
}

function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

// ============ FILE HANDLING ============

// ============ PROGRESS UI ============

function showProgress(step) {
  document.getElementById('progressOverlay').style.display = 'flex';
  document.getElementById('progressStep').innerHTML = '<span class="progress-spinner"></span> ' + step;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressStats').textContent = '';
}

function updateProgress(step, pct, stats) {
  document.getElementById('progressStep').textContent = step;
  document.getElementById('progressFill').style.width = Math.min(100, Math.max(0, pct)) + '%';
  document.getElementById('progressStats').textContent = stats || '';
}

function hideProgress() {
  document.getElementById('progressOverlay').style.display = 'none';
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ============ FILE HANDLING ============

async function processFile(file) {
  try {
    appState.fileName = file.name;
    showProgress('Lecture du fichier...');
    updateProgress('Lecture du fichier...', 5);

    const arrayBuffer = await file.arrayBuffer();
    let allText = '';

    if (file.name.endsWith('.tgz') || file.name.endsWith('.tar.gz')) {
      updateProgress('Décompression GZip...', 10);
      await sleep(40);

      let files;
      try {
        files = extractTgz(arrayBuffer);
      } catch (e) {
        hideProgress();
        throw new Error('Échec décompression .tgz : ' + e.message);
      }

      updateProgress(files.length + ' fichier(s) extrait(s) de l\'archive', 20);

      const textFiles = files.filter(f =>
        f.name.toLowerCase().endsWith('.edr') || f.name.toLowerCase().endsWith('.cdr') ||
        f.name.toLowerCase().endsWith('.txt') || f.name.toLowerCase().endsWith('.csv') ||
        f.name.toLowerCase().endsWith('.log')
      );

      if (textFiles.length === 0) {
        hideProgress();
        throw new Error('Aucun fichier .edr, .cdr, ou .txt trouvé. Fichiers : ' + files.map(f=>f.name).join(', '));
      }

      updateProgress('Lecture de ' + textFiles.length + ' fichier(s) texte...', 25);
      await sleep(40);

      for (let i = 0; i < textFiles.length; i++) {
        allText += readTextFromUint8Array(textFiles[i].data) + '\n';
        updateProgress(
          'Lecture : ' + textFiles[i].name,
          25 + Math.round((i + 1) / textFiles.length * 10)
        );
      }
    } else if (file.name.endsWith('.gz')) {
      updateProgress('Décompression GZip...', 10);
      await sleep(40);
      const decompressed = pako.ungzip(new Uint8Array(arrayBuffer));
      allText = new TextDecoder('utf-8').decode(decompressed);
      updateProgress('Décompression terminée', 20);
    } else {
      allText = new TextDecoder('utf-8').decode(new Uint8Array(arrayBuffer));
      updateProgress('Fichier lu', 15);
    }

    updateProgress('Parsing des événements CDR/EDR...', 35);
    await sleep(40);

    const { events, errors } = parseAll(allText, (current, total, parsed) => {
      const pct = 35 + Math.round((current / total) * 45);
      updateProgress(
        'Parsing : ' + current.toLocaleString() + ' / ' + total.toLocaleString() + ' lignes',
        pct,
        parsed.toLocaleString() + ' événements trouvés'
      );
    });

    if (events.length === 0) {
      hideProgress();
      throw new Error('Aucun événement CDR/EDR valide trouvé dans le fichier.');
    }

    updateProgress('Parsing terminé : ' + events.length.toLocaleString() + ' événements', 80, '');
    await sleep(40);

    updateProgress('Corrélation des sessions...', 85);
    await sleep(40);
    const sessions = correlateEvents(events);

    updateProgress(sessions.length + ' sessions corrélées', 90);
    await sleep(40);

    updateProgress('Génération de l\'interface...', 95);
    await sleep(40);

    appState.events = events;
    appState.sessions = sessions;
    appState.eventsPage = 1;
    appState.sessionsPage = 1;
    appState.kpiPage = 1;

    renderAll();

    updateProgress('Terminé !', 100, events.length.toLocaleString() + ' événements, ' + sessions.length + ' sessions');
    await sleep(400);

    hideProgress();

    toast('✅ ' + events.length.toLocaleString() + ' événements parsés, ' + sessions.length + ' sessions corrélées' + (errors.length > 0 ? ' (' + errors.length + ' lignes ignorées)' : ''));

    if (errors.length > 0 && errors.length <= 10) {
      console.warn('Parse errors:', errors);
      toast('⚠️ ' + errors.length + ' ligne(s) non parsée(s)', true);
    } else if (errors.length > 10) {
      toast('⚠️ ' + errors.length + ' lignes non parsées (voir console)', true);
      console.warn('Parse errors:', errors);
    }

  } catch (e) {
    console.error('File processing error:', e);
    hideProgress();
    toast('❌ Erreur : ' + e.message, true);
    showUploadOverlay(true);
  }
}

// ============ DRAG & DROP ============

function initDragDrop() {
  const zone = document.getElementById('uploadZone');
  const overlay = document.getElementById('uploadOverlay');
  const fileInput = document.getElementById('fileInput');

  // Click to open file dialog
  zone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      processFile(fileInput.files[0]);
    }
  });

  // Drag events on the zone
  zone.addEventListener('dragover', (e) => {
    e.preventDefault();
    zone.classList.add('drag-over');
  });
  zone.addEventListener('dragleave', () => {
    zone.classList.remove('drag-over');
  });
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) {
      processFile(e.dataTransfer.files[0]);
    }
  });

  // Also handle drag on the overlay (for when it's shown)
  overlay.addEventListener('dragover', (e) => e.preventDefault());
  overlay.addEventListener('drop', (e) => {
    e.preventDefault();
    if (e.dataTransfer.files.length > 0) {
      processFile(e.dataTransfer.files[0]);
    }
  });

  // Body-level drag to show overlay if hidden
  document.body.addEventListener('dragover', (e) => {
    e.preventDefault();
    if (appState.events.length === 0) {
      showUploadOverlay(true);
    }
  });
}

// ============ EXPORT CSV ============

function exportCSV() {
  const events = appState.events;
  if (events.length === 0) {
    toast('Aucune donnée à exporter.', true);
    return;
  }

  // Build CSV header
  const headers = ['datetime','event_id','event_name','category','msisdn','org_id','session_id'];
  const allParamKeys = new Set();
  events.forEach(e => Object.keys(e.params).forEach(k => allParamKeys.add(k)));
  const sortedParamKeys = [...allParamKeys].sort();
  headers.push(...sortedParamKeys);

  const rows = [headers.join(';')];

  events.forEach(e => {
    const row = [
      e.datetime,
      e.eventId,
      `"${e.eventName}"`,
      e.category,
      e.g1_msisdn,
      e.g2_org_id,
      e.session_id
    ];
    sortedParamKeys.forEach(k => {
      const val = e.params[k]||'';
      row.push(val.includes(';') || val.includes('"') ? `"${val.replace(/"/g,'""')}"` : val);
    });
    rows.push(row.join(';'));
  });

  const csv = rows.join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cdr_export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 Export CSV téléchargé');
}

// ============ THEME ============

function toggleTheme() {
  const html = document.documentElement;
  const goLight = html.dataset.theme !== 'light';
  html.dataset.theme = goLight ? 'light' : 'dark';
  localStorage.setItem('cdr-theme', html.dataset.theme);
  syncThemeButtons();
  if (appState.events.length > 0) {
    const stats = computeStatistics(appState.events, appState.sessions);
    renderCharts(stats);
    renderKpiTab();
  }
}

function syncThemeButtons() {
  const icon = document.documentElement.dataset.theme === 'light' ? '🌙' : '☀️';
  document.querySelectorAll('.btn-theme-icon').forEach(el => {
    el.textContent = icon;
  });
}

// ============ INIT ============

function init() {
  const savedTheme = localStorage.getItem('cdr-theme') || 'dark';
  document.documentElement.dataset.theme = savedTheme;
  syncThemeButtons();

  document.getElementById('btnTheme').addEventListener('click', toggleTheme);
  document.getElementById('btnUploadTheme').addEventListener('click', event => {
    event.stopPropagation();
    toggleTheme();
  });

  initDragDrop();

  document.getElementById('btnUpload').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    appState.events = [];
    appState.sessions = [];
    appState.fileName = '';
    appState.eventsSortColumn = 'date';
    appState.eventsSortDirection = 'asc';
    appState.eventsPage = 1;
    appState.sessionsSortColumn = null;
    appState.sessionsSortDirection = 'asc';
    appState.sessionsPage = 1;
    appState.kpiSortColumn = null;
    appState.kpiSortDirection = 'asc';
    appState.kpiPage = 1;
    Object.values(appState.charts).forEach(c => { try { c.dispose(); } catch(e) {} });
    appState.charts = {};
    document.getElementById('modalContainer').innerHTML = '';
    const contentEl = document.getElementById('dashboardContent');
    if (contentEl) contentEl.innerHTML = '';
    showUploadOverlay(true);
    toast('🔄 Application réinitialisée');
  });

  document.getElementById('btnExportCSV').addEventListener('click', exportCSV);

  // Keyboard shortcut for closing modals
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeModal();
    }
  });

  // Initial state
  showUploadOverlay(true);
}

// Start the app
document.addEventListener('DOMContentLoaded', init);
</script>
