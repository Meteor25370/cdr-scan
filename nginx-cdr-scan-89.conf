upstream cdr_scan_backend_89 {
    server 127.0.0.1:8089;
    keepalive 8;
}

server {
    listen 89 ssl http2;
    listen [::]:89 ssl http2;

    server_name labfoundry.eu www.labfoundry.eu;

    ssl_certificate /etc/letsencrypt/live/labfoundry.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/labfoundry.eu/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    ssl_session_timeout 1d;
    ssl_session_cache shared:CDR_SCAN_89_SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/cdr-scan-89-access.log;
    error_log /var/log/nginx/cdr-scan-89-error.log;

    location / {
        proxy_pass http://cdr_scan_backend_89;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
